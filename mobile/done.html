<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equora - Task Done</title>
    <link rel="stylesheet" href="style/mobile.css"/>
    <link rel="stylesheet" href="style/done.css"/>
    <link rel="stylesheet" href="./../styles/card.css"/>
</head>
<body>

<div class="app" id="app">
    <div class="done-content card">
        <div class="checkmark-container">
            <svg class="checkmark-circle" viewBox="0 0 120 120">
                <circle class="checkmark-bg" cx="60" cy="60" r="54" fill="none" stroke="#99eb9c" stroke-width="6"/>
                <circle class="checkmark-draw" cx="60" cy="60" r="54" fill="none" stroke="#99eb9c" stroke-width="6"
                        stroke-linecap="round" stroke-dasharray="340" stroke-dashoffset="340"/>
                <polyline class="checkmark-check" points="35,60 52,77 85,43"
                          fill="none" stroke="#99eb9c" stroke-width="6"
                          stroke-linecap="round" stroke-linejoin="round"
                          stroke-dasharray="70" stroke-dashoffset="70"/>
            </svg>
        </div>

        <p class="done-message">Task marked as done!</p>

        <button class="return-btn" id="btn-return-dashboard">Return to Dashboard</button>
    </div>
</div>

</body>
<script type="module">
    import {CACHE} from "../scripts/cache.js";

    document.getElementById("btn-return-dashboard").addEventListener("click", () => {
        CACHE.loadConfig();
        const taskId = new URLSearchParams(window.location.search).get("task");
        CACHE.updateStatus(taskId, "Done");
        CACHE.saveConfig();
        window.location.href = "index.html";
    });
</script>
</html>
