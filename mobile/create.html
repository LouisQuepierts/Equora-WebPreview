<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equora - Task Manager</title>
    <link rel="stylesheet" href="style/mobile.css"/>
    <link rel="stylesheet" href="../styles/create.css"/>
    <link rel="stylesheet" href="./../styles/card.css">
</head>
<body>

<div class="app" id="app">

    <header class="header">
        <button class="header-btn" id="btn-return"><</button>

        <h1>Confirm Tasks</h1>

        <div class="header-spacer"></div>
    </header>

    <main class="create-content">
        <div class="create-card card">
            <label class="title-label">Input</label>
            <div class="inner">
                <span class="input-content" id="inputDisplay"></span>
            </div>
        </div>

        <div class="create-card card">
            <label class="title-label">Tasks</label>
            <div class="inner create" id="tasks" style="padding-right: 8px"></div>
        </div>
    </main>

    <footer class="detail-actions">
        <button class="action-btn action-done">Confirm</button>
        <button class="action-btn action-delete">Discard</button>
    </footer>
</div>

<script src="../scripts/create.js" type="module"></script>
</body>
</html>
