<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equora - Task Manager</title>
    <link rel="stylesheet" href="style/mobile.css"/>
    <link rel="stylesheet" href="../styles/card.css"/>
    <link rel="stylesheet" href="style/detail.css"/>
</head>
<body>

<div class="app" id="app">
    <header class="header">
        <button class="header-btn" id="btn-return"><</button>

        <h1>Task Detail</h1>

        <div class="header-spacer"></div>
    </header>

    <div class="detail-content">
        <div class="detail-card card">
            <div class="detail-row">
                <span class="detail-label">Task</span>
                <span class="detail-value" id="detail-task"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Time</span>
                <span class="detail-value" id="detail-time"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="task-status" style="align-self: flex-start" id="detail-status"></span>
            </div>
        </div>
    </div>

    <div class="detail-actions">
        <button class="action-btn action-done" id="btn-done">Mark as Done</button>
        <button class="action-btn action-delay" id="btn-delay">Delay</button>
        <button class="action-btn action-delete" id="btn-delete">Delete</button>
    </div>

    <!-- Delay pop-up -->
    <div class="popup-overlay" id="popup-delay">
        <div class="popup">
            <h3 class="popup-title">Delay Task</h3>
            <p class="popup-desc">How long would you like to delay this task?</p>
            <div class="popup-options" id="delay-options">
                <button class="delay-option" data-delay="later">Later</button>
                <button class="delay-option" data-delay="tomorrow">Tomorrow</button>
            </div>
            <button class="popup-cancel" id="btn-cancel-delay">Cancel</button>
        </div>
    </div>

    <!-- Delete confirmation pop-up -->
    <div class="popup-overlay" id="popup-delete">
        <div class="popup">
            <h3 class="popup-title">Delete Task</h3>
            <p class="popup-desc">Are you sure you want to delete this task? This action cannot be undone.</p>
            <div class="popup-confirm-row">
                <button class="popup-btn popup-btn-cancel" id="btn-cancel-delete">Cancel</button>
                <button class="popup-btn popup-btn-delete" id="btn-confirm-delete">Delete</button>
            </div>
        </div>
    </div>
</div>

</body>
<script type="module" src="../scripts/detail.js"></script>
<script>
    document.getElementById("btn-return").addEventListener("click", () => {
        //  goto index
        window.location.href = "index.html";
    })
</script>
</html>
