<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equora - Task Manager</title>
    <link rel="stylesheet" href="style/mobile.css"/>
    <link rel="stylesheet" href="style/card.css"/>
    <link rel="stylesheet" href="style/detail.css"/>
</head>
<body>

<div class="app" id="app">
    <header class="header">
        <button class="header-btn" id="btn-return"><</button>

        <h1>Task Detail</h1>

        <div class="header-spacer"></div>
    </header>

    <div class="detail-content">
        <div class="detail-card">
            <div class="detail-row">
                <span class="detail-label">Task</span>
                <span class="detail-value" id="detail-task"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Time</span>
                <span class="detail-value" id="detail-time"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="task-status" style="align-self: flex-start" id="detail-status"></span>
            </div>
        </div>
    </div>

    <div class="detail-actions">
        <button class="action-btn action-done">Mark as Done</button>
        <button class="action-btn action-delay">Delay</button>
        <button class="action-btn action-delete">Delete</button>
    </div>
</div>

</body>
<script type="module" src="../scripts/detail.js"></script>
<script>
    document.getElementById("btn-return").addEventListener("click", () => {
        //  goto index
        window.location.href = "index.html";
    })
</script>
</html>
