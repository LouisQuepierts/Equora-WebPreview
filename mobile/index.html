<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equora - Task Manager</title>
    <link rel="stylesheet" href="mobile.css"/>
    <link rel="stylesheet" href="card.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app">

<header class="header">
    <h1>Equora</h1>
</header>

<main class="content">
    <div class="list" id="list"></div>
</main>

<footer class="footer" id="footer">

  <!-- collapsed 按钮层 -->
  <div class="plus-area" id="plusArea">
    +
  </div>

  <!-- expanded 内容层 -->
  <div class="footer-expanded">

    <div class="drag-bar"></div>

    <div class="footer-header">
      Create Task
    </div>

    <div class="input-row">
      <button class="mic-btn">
        <img src="../assets/microphone.svg" />
      </button>
      <input class="task-input" placeholder="Enter task..."/>
      <button class="submit-btn">↑</button>
    </div>

  </div>

</footer>

</div>
</body>

<script type="module" src="../scripts/cardlist.js"></script>
<script>
  document.getElementById('plusArea')
  .addEventListener('click', () => {
    document.getElementById('footer')
      .classList.add('open');
  });

  document.querySelector('.drag-bar')
  .addEventListener('click', () => {
    document.getElementById('footer')
      .classList.remove('open');
  });
</script>

</html>
