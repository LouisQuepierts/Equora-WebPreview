<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equora - Desktop</title>
    <link rel="stylesheet" href="style/desktop.css"/>
    <link rel="stylesheet" href="./../styles/card.css"/>
</head>
<body>
<div class="app" id="app">

<header class="header">
    <button class="header-btn">☰</button>
    <h1>Equora</h1>
    <div class="header-spacer"></div>
</header>

<main class="content">
    <div class="list dashboard" id="list"></div>
</main>

<footer class="footer" id="footer">
    <div class="footer-header">Create Task</div>

    <div class="transcription-display" id="transcriptionDisplay"></div>

    <div class="input-row" id="inputRow">
        <button class="mic-btn" id="micBtn">
            <img src="../assets/microphone.svg" alt=""/>
        </button>
        <button class="keyboard-btn" id="keyboardBtn">
            <img src="../assets/keyboard.svg" alt=""/>
        </button>
        <textarea class="task-input" id="taskInput" placeholder="Enter task..." rows="1"></textarea>
        <button class="hold-speak-btn" id="holdSpeakBtn">Hold to speak</button>
        <button class="submit-btn" id="submitBtn">↑</button>
    </div>
</footer>

<!-- Task Detail Side Panel -->
<div class="side-panel-overlay" id="sidePanelOverlay">
    <aside class="side-panel" id="sidePanel">
        <div class="side-panel-header">
            <h2>Task Detail</h2>
            <button class="side-panel-close" id="btn-close-panel">&times;</button>
        </div>

        <div class="side-panel-body">
            <div class="detail-row">
                <span class="detail-label">Task</span>
                <span class="detail-value" id="panel-task"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Time</span>
                <span class="detail-value" id="panel-time"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="task-status" id="panel-status"></span>
            </div>
        </div>

        <div class="side-panel-actions">
            <button class="action-btn action-done" id="btn-panel-done">Mark as Done</button>
            <button class="action-btn action-delay" id="btn-panel-delay">Delay</button>
            <button class="action-btn action-delete" id="btn-panel-delete">Delete</button>
        </div>
    </aside>
</div>

<!-- Delay Pop-up -->
<div class="popup-overlay" id="popup-delay">
    <div class="popup">
        <h3 class="popup-title">Delay Task</h3>
        <p class="popup-desc">How long would you like to delay this task?</p>
        <div class="popup-options" id="delay-options">
            <button class="delay-option" data-delay="30min">30 Minutes</button>
            <button class="delay-option" data-delay="1hour">1 Hour</button>
            <button class="delay-option" data-delay="2hours">2 Hours</button>
            <button class="delay-option" data-delay="tomorrow">Tomorrow</button>
        </div>
        <button class="popup-cancel" id="btn-cancel-delay">Cancel</button>
    </div>
</div>

<!-- Delete Confirmation Pop-up -->
<div class="popup-overlay" id="popup-delete">
    <div class="popup">
        <h3 class="popup-title">Delete Task</h3>
        <p class="popup-desc">Are you sure you want to delete this task? This action cannot be undone.</p>
        <div class="popup-confirm-row">
            <button class="popup-btn popup-btn-cancel" id="btn-cancel-delete">Cancel</button>
            <button class="popup-btn popup-btn-delete" id="btn-confirm-delete">Delete</button>
        </div>
    </div>
</div>

<!-- Done Completion Pop-up -->
<div class="popup-overlay" id="popup-done">
    <div class="popup">
        <div class="done-content">
            <div class="checkmark-container">
                <svg class="checkmark-circle" viewBox="0 0 120 120">
                    <circle class="checkmark-bg" cx="60" cy="60" r="54" fill="none" stroke="#4CAF50" stroke-width="6"/>
                    <circle class="checkmark-draw" cx="60" cy="60" r="54" fill="none" stroke="#4CAF50" stroke-width="6"
                            stroke-linecap="round" stroke-dasharray="340" stroke-dashoffset="340"/>
                    <polyline class="checkmark-check" points="35,60 52,77 85,43"
                              fill="none" stroke="#4CAF50" stroke-width="6"
                              stroke-linecap="round" stroke-linejoin="round"
                              stroke-dasharray="70" stroke-dashoffset="70"/>
                </svg>
            </div>
            <p class="done-message">Task marked as done!</p>
            <button class="done-return-btn" id="btn-done-return">Return to Dashboard</button>
        </div>
    </div>
</div>

<!-- Create Confirm Pop-up -->
<div class="popup-overlay" id="popup-create">
    <div class="popup create-popup">
        <h3 class="popup-title">Confirm Tasks</h3>
        <div class="popup-body">
            <div class="create-card">
                <label class="title-label">Input</label>
                <div class="inner" id="create-input-display"></div>
            </div>
            <div class="create-card">
                <label class="title-label">Tasks</label>
                <div class="inner create" id="create-tasks-container"></div>
            </div>
        </div>
        <div class="create-popup-actions">
            <button class="action-btn action-done" id="btn-create-confirm">Confirm</button>
            <button class="action-btn action-delete" id="btn-create-discard">Discard</button>
        </div>
    </div>
</div>

</div>

<script type="module" src="./../scripts/cardlist.js"></script>
<script type="module" src="./script/index.js"></script>
</body>
</html>
